<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply Now - HireSphere</title>
   <style>
    :root {
        --primary: #2563eb;
        --primary-dark: #1d4ed8;
        --bg: #f5f7fb;
        --text: #1f2937;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
    
    body { background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; }

    .container { 
        max-width: 450px; 
        width: 90%; 
        background: white; 
        padding: 30px; 
        border-radius: 12px; 
        box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
    }

    h2 { text-align: center; margin-bottom: 25px; color: var(--primary); font-size: 24px; }

    #jobDetails { 
        margin-bottom: 20px; 
        background: #eff6ff; 
        padding: 15px; 
        border-radius: 8px; 
        border-left: 4px solid var(--primary);
        font-size: 0.95rem;
    }

    #jobDetails strong { color: var(--primary); font-size: 1.1rem; }

    input { 
        width: 100%; 
        padding: 12px 15px; 
        margin: 8px 0 15px 0; 
        border: 1.5px solid #e5e7eb; 
        border-radius: 8px; 
        outline: none;
        transition: border-color 0.2s;
    }

    input:focus { border-color: var(--primary); }

    button { 
        width: 100%; 
        padding: 14px; 
        background: var(--primary); 
        color: white; 
        border: none; 
        border-radius: 8px; 
        cursor: pointer; 
        font-weight: 600; 
        font-size: 16px;
        transition: 0.3s;
    }

    button:hover { background: var(--primary-dark); transform: translateY(-2px); }
    
    button:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }
</style>
</head>
<body>

<div class="container">
    <h2>Apply for Job</h2>
    
    <div id="jobDetails"></div>

    <input type="text" id="name" placeholder="Your Name" required>
    <input type="email" id="email" placeholder="Your Email" required>
    
    <button type="button" id="submitBtn" onclick="applyNow()">Submit Application</button>
</div>

<script>
    // 1. Fetch Job Data from LocalStorage (set by jobs.html)
    const title = localStorage.getItem("jobTitle");
    const company = localStorage.getItem("jobCompany");
    const locationInfo = localStorage.getItem("jobLocation");

    // 2. Display the data immediately
    const detailsDiv = document.getElementById("jobDetails");
    if (title) {
        detailsDiv.innerHTML = `<strong>${title}</strong><br>${company}<br>${locationInfo}`;
    } else {
        detailsDiv.innerHTML = `<span style="color:red;">No job selected. Please go back to the jobs page.</span>`;
        document.getElementById("submitBtn").disabled = true;
    }

    function applyNow() {
        const nameField = document.getElementById("name");
        const emailField = document.getElementById("email");
        const submitBtn = document.getElementById("submitBtn");

        const name = nameField.value.trim();
        const email = emailField.value.trim();

        // Basic Validation
        if (name === "" || email === "") {
            alert("Please fill in all fields.");
            return;
        }

        // Disable button to prevent double submission
        submitBtn.disabled = true;
        submitBtn.innerText = "Submitting...";

        try {
            // Get existing applications or start a new array
            let applications = JSON.parse(localStorage.getItem("applications")) || [];

            // Create new application object
            const newApp = {
                name: name,
                email: email,
                title: title,
                company: company,
                location: locationInfo,
                date: new Date().toLocaleDateString() // Bonus: Add a date!
            };

            // Save back to localStorage
            applications.push(newApp);
            localStorage.setItem("applications", JSON.stringify(applications));

            alert("Application Submitted Successfully!");

            // Redirect to the applications list
            window.location.href = "applications.html";

        } catch (error) {
            console.error("Error saving application:", error);
            alert("Failed to save application. Please try again.");
            submitBtn.disabled = false;
            submitBtn.innerText = "Submit Application";
        }
    }
</script>

</body>
</html>
