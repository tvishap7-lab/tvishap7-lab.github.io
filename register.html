<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - HireSphere</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#f5f7fb;display:flex;justify-content:center;align-items:center;height:100vh;}
.register-box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.2);
width:380px;
text-align:center;
}
.register-box h2{margin-bottom:20px;color:#2563eb;}
.register-box input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}
.register-box button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}
.register-box button:hover{background:#1d4ed8;}
.register-box p{margin-top:15px;font-size:14px;}
.register-box a{color:#2563eb;text-decoration:none;}
</style>
</head>
<body>
<div class="register-box">
<h2>Create Account</h2>
<form>
<input type="text" placeholder="Full Name" required>
<input type="email" placeholder="Enter Email" required>
<input type="password" placeholder="Create Password" required>
<input type="password" placeholder="Confirm Password" required>
<button type="submit">Register</button>
</form>
<p>Already have an account? <a href="login.html">Login</a></p>
</div>
<script>
document.querySelector("form").addEventListener("submit", function(e){
  e.preventDefault();

  let name = document.querySelector('input[type="text"]').value;
  let email = document.querySelector('input[type="email"]').value;
  let pass = document.querySelectorAll('input[type="password"]')[0].value;
  let confirm = document.querySelectorAll('input[type="password"]')[1].value;

  if(pass !== confirm){
    alert("Passwords do not match ❌");
    return;
  }

  // store ALL details
  localStorage.setItem("username", name);
  localStorage.setItem("email", email);
  localStorage.setItem("password", pass);

  window.location.href = "login.html";
});
</script>
</body>
</html>
